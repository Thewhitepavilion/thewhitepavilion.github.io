<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The White Pavilion @ i-City</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            color: #333;
            text-align: center;
        }
        .container {
            padding: 50px 20px;
        }
        h1 {
            font-weight: 300;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }
        p {
            color: #777;
            margin-bottom: 30px;
        }
        .cta-button {
            display: inline-block;
            background-color: #000;
            color: #fff;
            padding: 15px 40px;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .cta-button:hover {
            background-color: #333;
            transform: translateY(-3px);
        }
        .image-box {
            max-width: 600px;
            margin: 40px auto;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        .image-box img {
            width: 100%;
            display: block;
        }
        .footer {
            margin-top: 50px;
            font-size: 12px;
            color: #aaa;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>THE WHITE PAVILION</h1>
        <p>Minimalist Luxury Staycation @ i-City, Shah Alam</p>

        <a href="https://wa.link/aomB9HC" class="cta-button">BOOK YOUR STAY NOW</a>

        <div class="image-box">
            <img src="https://images.unsplash.com/photo-1522708323590-d24dbb6b0267?ixlib=rb-4.0.3&auto=format&fit=crop&w=1170&q=80" alt="The White Pavilion Suite">
        </div>

        <div class="footer">
            &copy; 2026 The White Pavilion. All rights reserved.
        </div>
    </div>

</body>
</html>
