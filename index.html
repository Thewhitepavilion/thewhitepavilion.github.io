<!DOCTYPE html>
<html lang="zh-MY">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The White Pavilion | i-Soho i-City</title>
    <style>
        :root { --gold: #bda37e; --dark: #2c3e50; --bg: #f8f9fa; }
        body { font-family: 'STHeiti', 'Microsoft YaHei', sans-serif; margin: 0; padding: 0; background: var(--bg); color: var(--dark); }
        
        /* 顶部横幅 */
        .hero { 
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                        url('https://images.unsplash.com/photo-1566073771259-6a8506099945?q=80&w=1000&auto=format&fit=crop'); 
            background-size: cover; background-position: center;
            height: 250px; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; text-align: center;
        }
        .hero h1 { font-size: 2rem; margin: 0; letter-spacing: 3px; }
        .hero p { font-size: 0.9rem; opacity: 0.9; margin-top: 10px; }

        .container { max-width: 500px; margin: -30px auto 50px; padding: 20px; position: relative; }

        /* 按钮样式 */
        .link-card {
            background: white; border-radius: 12px; padding: 18px; margin-bottom: 15px;
            display: flex; align-items: center; text-decoration: none; color: var(--dark);
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); transition: 0.3s; border: 1px solid #eee;
        }
        .link-card:active { transform: scale(0.98); background: #f0f0f0; }
        .icon { font-size: 24px; margin-right: 15px; width: 30px; text-align: center; }
        .text { flex: 1; }
        .text span { display: block; font-weight: bold; font-size: 1.1rem; }
        .text small { font-size: 0.8rem; color: #777; }

        /* 重点公告栏 */
        .announcement {
            background: #fffcf5; border-left: 4px solid var(--gold);
            padding: 15px; border-radius: 8px; margin-bottom: 25px; font-size: 0.9rem;
        }

        .footer { text-align: center; color: #bbb; padding: 30px; font-size: 0.8rem; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div class="hero">
        <h1>THE WHITE PAVILION</h1>
        <p>Premium Stay @ i-Soho i-City</p>
    </div>

    <div class="container">
        
        <div class="announcement">
            <b>📢 预订须知 / Booking Rules:</b><br>
            • 需在24小时内结清房费及押金以保留预订。<br>
            • 室内严禁吸烟、电子烟及派对。
        </div>

        <a href="https://wa.me/601168744885?text=Hi! I want to book The White Pavilion." class="link-card" style="border-left: 6px solid #25d366;">
            <div class="icon">💬</div>
            <div class="text">
                <span>WhatsApp 立即预订</span>
                <small>直接联系老板，确认房态</small>
            </div>
        </a>

        <a href="https://waze.com/ul/hw281mshge" class="link-card">
            <div class="icon">🚗</div>
            <div class="text">
                <span>Waze 导航至 i-Soho</span>
                <small>一键开启 Waze，直达大厅</small>
            </div>
        </a>

        <a href="https://www.google.com/maps/search/?api=1&query=i-Soho+i-City+Shah+Alam" class="link-card">
            <div class="icon">📍</div>
            <div class="text">
                <span>Google Maps 地图</span>
                <small>查看位置与周边环境</small>
            </div>
        </a>

        <a href="tel:+601168744885" class="link-card">
            <div class="icon">📞</div>
            <div class="text">
                <span>紧急联系老板</span>
                <small>拨通电话寻求即时帮助</small>
            </div>
        </a>

        <a href="#" class="link-card">
            <div class="icon">⭐</div>
            <div class="text">
                <span>查看 Trip.com 评价</span>
                <small>看看住客们怎么说</small>
            </div>
        </a>

    </div>

    <div class="footer">© 2026 THE WHITE PAVILION<br>DESIGNED FOR EXCELLENCE</div>

</body>
</html>
